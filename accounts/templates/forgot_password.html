{% load static%}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="{% static 'images/favIconn.jpg' %}">
    <style>

        .form-control:focus{
            border-color:#79b9cc;
            box-shadow:0 0 0 0.15rem rgba(121,185,204,0.25);
        }

        body{
            background:#fff;
        }

        .btn-submit{
            background-color:#79b9cc;
            color:black;
            border-radius:10px;
            border:none;
            height:45px;
            transition:all 0.5s ease;
        }

        .btn-submit:hover{
            background-color:#3f95ad;
            color:white;
        }

        .login-card{
            width:500px;
            margin:60px auto;
            padding:30px;
            background:#fff;
            border-radius:16px;
            box-shadow:0 10px 30px rgba(0,0,0,0.05);
        }

        .form-floating label{
            font-size:14px;
            color:#8e8e8e;
        }

        .form-control:hover{
            box-shadow:none;
            border-color:#1877f2;
        }

        .rounded-input{
            border-radius:15px !important;
            width:100%;
            height:45px;
            padding:10px 15px;
            font-size:14px;
        }

        /* ALERT STYLE */

        .alert{
            display:flex;
            align-items:center;
            padding:10px 14px;
            font-size:14px;
            border-radius:10px;
            margin-bottom:15px;
            box-shadow:0 6px 15px rgba(0,0,0,0.05);
        }

        .alert-danger{
            background:#fdeaea;
            color:#b02a37;
            border-left:4px solid #ea5455;
        }

        .alert-success{
            background:#e9f9f0;
            color:#157347;
            border-left:4px solid #28c76f;
        }

        .alert-info{
            background:#eef7ff;
            color:#084298;
            border-left:4px solid #5eaec4;
        }

    </style>

</head>

<body>
    <div class="login-card">
        <h3 class="text-center mb-3">Reset Password</h3>
        {% if messages %}
        {% for message in messages %}
        <div class="alert 
            {% if message.tags == 'error' %}
            alert-danger
            {% elif message.tags == 'success' %}
            alert-success
            {% else %}
            alert-info
            {% endif %}">

            {{ message }}
        </div>

        {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-floating mb-3">
                <input type="text"
                class="form-control rounded-input"
                name="username"
                placeholder="Username"
                required>
                <label>Username</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password"
                class="form-control rounded-input"
                name="new_password"
                placeholder="New Password"
                required>
                <label>New Password</label>
            </div>

            <button type="submit" class="btn btn-submit w-100">
            Change Password
            </button>

        </form>

        <div class="text-center mt-3">
            <a href="{% url 'login' %}">Back to Login</a>
        </div>
    </div>

</body>
</html>
