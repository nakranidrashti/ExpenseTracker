{% extends "base.html" %}
{% block title %}Add Income{% endblock %}

{% block content %}
<h1 class="page-title">Add Income</h1>
<form method="POST" class="expense-form">
    {% csrf_token %}

    <!-- Title first -->
    <div class="mb-3">
        <label class="form-label" for="title">Title</label>
        <input type="text" name="title" id="title" class="form-control" placeholder="Enter title">
    </div>

    <!-- Description second -->
    <div class="mb-3">
        <label class="form-label" for="description">Description</label>
        <textarea id="description" name="description" class="form-control" placeholder="Enter description..." rows="3"></textarea>
    </div>

    <!-- Category third -->
    <div class="mb-3">
        <label class="form-label" for="category">Category</label>
        <select name="category" id="category" class="form-select">
            <option value="" selected>Select category</option>
            {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
            {% endfor %}
        </select>
    </div>

    <!-- Amount fourth -->
    <div class="mb-3">
        <label class="form-label" for="amount">Amount</label>
        <input type="number" step="0.01" name="amount" id="amount" class="form-control" placeholder="Enter amount">
    </div>

    <!-- Date fifth -->
    <div class="mb-3">
        <label class="form-label" for="date">Date</label>
        <input type="date" name="date" id="date" class="form-control">
    </div>
    
    <div id="suggestion" class="ai-suggestion"></div>
    <button type="submit" class="btn btn-submit mt-3">Save Income</button>

</form>

<!-- AI Suggestion Script -->
<script>
    const description = document.getElementById("description");
    const category = document.getElementById("category");
    const suggestion = document.getElementById("suggestion");

    description.addEventListener("keyup", function(){

    if(description.value.length < 3){
    suggestion.classList.remove("show");
    return;
    }

    /* AI thinking animation */

    suggestion.innerHTML =
    `<span class="ai-icon">🤖</span>
    <div>
    <strong>AI Assistant</strong><br>
    Analyzing description
    <span class="ai-loading"><span>.</span><span>.</span><span>.</span></span>
    </div>`;

    suggestion.classList.add("show");

    setTimeout(() => {

    fetch(`/predict-category/?description=${encodeURIComponent(description.value)}`)
    .then(response => response.json())
    .then(data => {
        
        if(data.category)
        {
            let found = false;
            for(let option of category.options)
            {
                if(option.text.toLowerCase() === data.category.toLowerCase())
                {
                    category.value = option.value;
                    found = true;
                }
            }

            if(found)
            {
                suggestion.innerHTML =
                `<span class="ai-icon">🤖</span>
                <div>
                <strong>AI Assistant</strong><br>
                Suggested category: <b>${data.category}</b> ✓
                </div>`;
            }
            else
            {
                suggestion.classList.remove("show");
            }

        }

        })
    .catch(error => console.log(error));

    },800);

    });

</script>
{% endblock %}
