{% extends "base.html" %}
{% block title %}Add Expense{% endblock %}

{% block content %}

<h1 class="page-title">Add Expense</h1>

<form method="POST" class="expense-form">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-control" placeholder="Title">
    </div>

    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea id="description" name="description" class="form-control" placeholder="Description" rows="3"></textarea>
        
    </div>

    <div class="mb-3">
        <label class="form-label">Category</label>
        <select name="category" id="category" class="form-select">
            <option value="" selected>Select category</option>
            {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Amount</label>
        <input type="number" step="0.01" name="amount" class="form-control" placeholder="Amount">
    </div>

    <div class="mb-3">
        <label class="form-label">Date</label>
        <input type="date" name="date" class="form-control" placeholder="Date">
    </div> 


    <div id="suggestion" class="ai-suggestion"></div>
    <button type="submit" class="btn btn-submit mt-3">Save Expense</button>

</form>

<script>
    const description = document.getElementById("description");
    const category = document.getElementById("category");
    const suggestion = document.getElementById("suggestion");

    description.addEventListener("keyup", function(){

    if(description.value.length < 3){
    suggestion.classList.remove("show");
    return;
    }

    /* AI thinking animation */

    suggestion.innerHTML =
    `<span class="ai-icon">🤖</span>
    <div>
    <strong>AI Assistant</strong><br>
    Analyzing description
    <span class="ai-loading"><span>.</span><span>.</span><span>.</span></span>
    </div>`;

    suggestion.classList.add("show");

    setTimeout(() => {

    fetch(`/predict-category/?description=${encodeURIComponent(description.value)}`)
    .then(response => response.json())
    .then(data => {
        if(data.category)
        {
            let found = false;
            for(let option of category.options)
            {
                if(option.text.toLowerCase() === data.category.toLowerCase())
                {
                    category.value = option.value;
                    found = true;
                }
            }

            if(found)
            {
                suggestion.innerHTML =
                `<span class="ai-icon">🤖</span>
                <div>
                <strong>AI Assistant</strong><br>
                Suggested category: <b>${data.category}</b> ✓
                </div>`;
            }
            else
            {
                suggestion.classList.remove("show");
            }
        }

        })
    .catch(error => console.log(error));

    },800);

    });
</script>
{% endblock %}
